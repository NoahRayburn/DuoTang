<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Type Puzzle Builder</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>DuoTang</h1>
            <p class="subtitle">Slot Type Puzzle Builder</p>
            <a href="index.html"
                style="position: absolute; top: 16px; left: 16px; color: var(--persian-green); text-decoration: none; font-weight: 700; font-size: 14px;">←
                Original Puzzle</a>
        </header>

        <main>
            <section id="slot-puzzle-config">
                <div style="text-align: center; margin-bottom: 24px;">
                    <button class="btn btn-primary" onclick="generateFullPuzzle()"
                        style="font-size: 18px; padding: 12px 24px; width: 100%; max-width: 400px;">
                        ✨ Generate New Puzzle
                    </button>
                    <div id="generate-status"
                        style="margin-top: 8px; font-size: 14px; font-weight: 600; min-height: 20px;"></div>
                </div>

                <!-- Puzzle Display Section -->
                <div id="puzzle-display" style="display: none;">

                    <!-- Source Words -->
                    <div class="stage">
                        <div style="margin-bottom: 12px;">
                            <h3 style="color: var(--charcoal); margin: 0;">📚 Source Words</h3>
                        </div>
                        <div id="source-words-list" class="letters"></div>
                    </div>

                    <!-- Extra Letters -->
                    <div class="stage">
                        <div style="margin-bottom: 12px;">
                            <h3 style="color: var(--charcoal); margin: 0;">🔤 Extra Letters</h3>
                        </div>
                        <div id="extra-letters-display" class="letters"></div>
                    </div>

                    <!-- Target Words -->
                    <div class="stage">
                        <div style="margin-bottom: 12px;">
                            <h3 style="color: var(--charcoal); margin: 0;">🎯 Target Words</h3>
                        </div>
                        <div id="target-words-list"></div>
                    </div>

                    <!-- Summary -->
                    <div id="slot-puzzle-summary" class="summary-panel">
                        <h3>Puzzle Solution Summary</h3>
                        <div id="slot-summary-content"></div>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <!-- No local words.js needed, we use CuratedWords.csv directly -->
    <script>
        // Common nouns loaded from CSV file
        let COMMON_NOUNS = [];

        // Load common nouns from CSV file
        fetch('CuratedWords.csv')
            .then(response => response.text())
            .then(csvText => {
                // Parse CSV: split by newlines
                COMMON_NOUNS = csvText
                    .split('\n')
                    .map(line => line.trim().toLowerCase())
                    .filter(word => word.length > 0);

                console.log(`Loaded ${COMMON_NOUNS.length} common nouns from CSV`);
                document.getElementById('generate-status').textContent = 'Ready to generate!';
            })
            .catch(err => {
                console.error('Failed to load CuratedWords.csv:', err);
                document.getElementById('generate-status').innerHTML = '<span style="color: var(--burnt-sienna);">Error loading word list. Check console.</span>';
            });

        // Slot Type Puzzle State
        let slotPuzzleState = {
            sourceWords: [],
            extraLetter1: '',
            extraLetter2: '',
            targetWords: ['', '', '']
        };

        // Utility: Get letter counts from a string
        function getSlotLetterCounts(str) {
            const counts = {};
            for (const char of str.toLowerCase()) {
                if (char >= 'a' && char <= 'z') {
                    counts[char] = (counts[char] || 0) + 1;
                }
            }
            return counts;
        }

        // Utility: Check if a word can be made from available letters
        function canMakeWordFromPool(word, letterPool) {
            const wordCounts = getSlotLetterCounts(word);
            const poolCounts = getSlotLetterCounts(letterPool);

            for (const [letter, count] of Object.entries(wordCounts)) {
                if (!poolCounts[letter] || poolCounts[letter] < count) {
                    return false;
                }
            }
            return true;
        }

        // Utility: Get base letter pool from source words only
        function getBaseLetterPool() {
            return slotPuzzleState.sourceWords.join('').toLowerCase();
        }

        // Generate Full Puzzle Logic
        async function generateFullPuzzle() {
            const statusEl = document.getElementById('generate-status');
            const displayEl = document.getElementById('puzzle-display');

            if (COMMON_NOUNS.length === 0) {
                statusEl.textContent = 'Waiting for word list to load...';
                return;
            }

            statusEl.innerHTML = '<span style="color: var(--persian-green);">🔄 Generating Puzzle...</span>';
            displayEl.style.display = 'none';

            // Allow UI to update
            await new Promise(r => setTimeout(r, 10));

            let success = false;
            let attempts = 0;
            const maxAttempts = 20;

            while (!success && attempts < maxAttempts) {
                attempts++;

                // 1. Pick Random Source Words (6-8 words)
                // Filter for words length 4-7 for good letter distribution
                const candidateWords = COMMON_NOUNS.filter(w => w.length >= 4 && w.length <= 7);
                const sourceWords = [];
                const numSourceWords = 2; // Fixed at 2 words as requested

                for (let i = 0; i < numSourceWords; i++) {
                    const randomWord = candidateWords[Math.floor(Math.random() * candidateWords.length)];
                    if (!sourceWords.includes(randomWord)) {
                        sourceWords.push(randomWord);
                    }
                }

                slotPuzzleState.sourceWords = sourceWords;
                const basePool = getBaseLetterPool();

                // 2. Try to find Extra Letters and Target Words
                const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
                const shuffledAlphabet = [...alphabet].sort(() => Math.random() - 0.5);

                // Try a few letter pairs per source set
                for (let i = 0; i < 50; i++) {
                    // Pick 2 random letters
                    const l1I = Math.floor(Math.random() * 26);
                    let l2I = Math.floor(Math.random() * 26);
                    while (l2I === l1I) l2I = Math.floor(Math.random() * 26);

                    const letter1 = alphabet[l1I];
                    const letter2 = alphabet[l2I];

                    const pool1 = basePool + letter1;
                    const pool2 = basePool + letter2;
                    const poolBoth = basePool + letter1 + letter2;

                    // Find Target Words from the same curated list
                    // Target 1: needs letter1, NOT letter2 (implied by checking pool1 availability vs pool2/base logic)
                    // Simplified logic: 
                    // T1: makeable with pool1, NOT makeable with basePool (must use L1)
                    // T2: makeable with pool2, NOT makeable with basePool (must use L2)
                    // T3: makeable with poolBoth, NOT makeable with pool1 OR pool2 (must use BOTH)

                    const validT1 = [];
                    const validT2 = [];
                    const validT3 = [];

                    // Optimization: Check a subset of words or random sample to speed up
                    const sampleSize = 1000;
                    const wordSample = [];
                    for (let k = 0; k < sampleSize; k++) {
                        wordSample.push(COMMON_NOUNS[Math.floor(Math.random() * COMMON_NOUNS.length)]);
                    }

                    for (const word of wordSample) {
                        if (word.length < 3 || word.length > 8) continue;

                        const usesL1 = canMakeWordFromPool(word, pool1);
                        const usesL2 = canMakeWordFromPool(word, pool2);
                        const usesBoth = canMakeWordFromPool(word, poolBoth);

                        // Check strictly that it *requires* the letter is tricky without subtraction logic
                        // but "makeable with pool1 AND NOT makeable with basePool" ensures L1 is used.
                        const makeableBase = canMakeWordFromPool(word, basePool);

                        if (usesL1 && !makeableBase) validT1.push(word);
                        if (usesL2 && !makeableBase) validT2.push(word);
                        // For T3, it must be makeable with Both, but NOT with just one of them + base
                        // actually wait, pool1 is base+L1. 
                        // So T3 must NOT be makeable with pool1 AND NOT makeable with pool2.
                        if (usesBoth && !usesL1 && !usesL2) validT3.push(word);
                    }

                    if (validT1.length > 0 && validT2.length > 0 && validT3.length > 0) {
                        // Found a valid set!
                        slotPuzzleState.extraLetter1 = letter1;
                        slotPuzzleState.extraLetter2 = letter2;
                        slotPuzzleState.targetWords = [
                            validT1[Math.floor(Math.random() * validT1.length)],
                            validT2[Math.floor(Math.random() * validT2.length)],
                            validT3[Math.floor(Math.random() * validT3.length)]
                        ];
                        success = true;
                        break;
                    }
                }

                if (success) break;
            }

            if (success) {
                renderPuzzle();
                statusEl.innerHTML = '<span style="color: var(--persian-green);">✅ Puzzle Generated!</span>';
                displayEl.style.display = 'block';
            } else {
                statusEl.innerHTML = '<span style="color: var(--burnt-sienna);">⚠️ Failed to generate. Please try again.</span>';
            }
        }

        // Render the UI
        function renderPuzzle() {
            // Render Source Words
            const sourceContainer = document.getElementById('source-words-list');
            sourceContainer.innerHTML = slotPuzzleState.sourceWords.map(w =>
                `<span style="background: var(--saffron); color: var(--charcoal); padding: 4px 10px; border-radius: 12px; font-weight: 700; border: 2px solid #c9a854;">${w.toUpperCase()}</span>`
            ).join('');

            // Render Extra Letters
            const extraContainer = document.getElementById('extra-letters-display');
            extraContainer.innerHTML = `
                <span class="letter-tile" style="background: #ffc107; border-color: #e0a800;">${slotPuzzleState.extraLetter1.toUpperCase()}</span>
                <span class="letter-tile" style="background: #ffc107; border-color: #e0a800;">${slotPuzzleState.extraLetter2.toUpperCase()}</span>
            `;

            // Render Target Words (Read Only)
            const targetContainer = document.getElementById('target-words-list');
            const targets = slotPuzzleState.targetWords;
            const l1 = slotPuzzleState.extraLetter1.toUpperCase();
            const l2 = slotPuzzleState.extraLetter2.toUpperCase();

            targetContainer.innerHTML = `
                <div style="margin-bottom: 8px;">
                    <div style="font-size: 12px; color: #666; margin-bottom: 4px;">Target 1 (Uses ${l1}):</div>
                    <div style="font-size: 18px; font-weight: 700; color: var(--persian-green);">${targets[0].toUpperCase()}</div>
                </div>
                <div style="margin-bottom: 8px;">
                    <div style="font-size: 12px; color: #666; margin-bottom: 4px;">Target 2 (Uses ${l2}):</div>
                    <div style="font-size: 18px; font-weight: 700; color: var(--persian-green);">${targets[1].toUpperCase()}</div>
                </div>
                <div style="margin-bottom: 8px;">
                    <div style="font-size: 12px; color: #666; margin-bottom: 4px;">Target 3 (Uses ${l1} + ${l2}):</div>
                    <div style="font-size: 18px; font-weight: 700; color: var(--persian-green);">${targets[2].toUpperCase()}</div>
                </div>
            `;

            // Render Summary
            const summaryContent = document.getElementById('slot-summary-content');
            summaryContent.innerHTML = `
                <p><strong>Source Words:</strong> ${slotPuzzleState.sourceWords.join(', ')}</p>
                <p><strong>Extra Letters:</strong> ${l1}, ${l2}</p>
                <p><strong>Solutions:</strong> ${targets.join(', ')}</p>
            `;
        }

    </script>
</body>

</html>
